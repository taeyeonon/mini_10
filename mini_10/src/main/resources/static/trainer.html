<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>트레이너 - 수업 일정</title>
    <link rel="stylesheet" href="/assets/css/console.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar"></aside>

    <main class="main">
        <div class="page-header">
            <div>
                <h1>수업 일정 관리</h1>
                <div class="today"></div>
            </div>
            <div class="profile">
                <div class="avatar">T</div>
                <div class="profile-text">
                    <div class="role">트레이너</div>
                    <div class="email"></div>
                </div>
                <button class="btn-ghost" onclick="jwtLogout()">로그아웃</button>
            </div>
        </div>

        <section class="summary">
            <div class="card">
                <div class="label">전체 일정</div>
                <div class="value" id="statTotal">-<small>건</small></div>
            </div>
            <div class="card">
                <div class="label">진행 예정 <span class="badge badge-paid">OPEN</span></div>
                <div class="value" id="statOpen">-<small>건</small></div>
            </div>
            <div class="card">
                <div class="label">정원 마감</div>
                <div class="value" id="statFull">-<small>건</small></div>
            </div>
            <div class="card">
                <div class="label">취소 <span class="badge badge-canceled">CANCELLED</span></div>
                <div class="value" id="statCancelled">-<small>건</small></div>
            </div>
        </section>

        <section class="card" style="margin-bottom: 16px;">
            <div class="card-title" id="formTitle">🗓️ 수업 일정 생성</div>
            <div class="card-desc" id="formDesc">시작 시각을 고르면 종료 시각이 1시간 뒤로 자동 설정됩니다.</div>
            <div class="card-body">
                <div class="form-grid">
                    <div>
                        <label for="startTime">시작 시각</label>
                        <input type="datetime-local" id="startTime">
                    </div>
                    <div>
                        <label for="endTime">종료 시각</label>
                        <input type="datetime-local" id="endTime">
                    </div>
                    <div>
                        <label for="capacity">정원</label>
                        <input type="number" id="capacity" min="1" value="10">
                    </div>
                    <div class="row-actions">
                        <button class="btn-primary" id="submitButton" style="flex: 1;">일정 생성</button>
                        <button class="btn-ghost" id="cancelEditButton" style="display: none;">취소</button>
                    </div>
                </div>
                <div class="message" id="formMessage"></div>
            </div>
        </section>

        <section class="card toolbar">
            <select id="status">
                <option value="">전체 상태</option>
                <option value="OPEN">오픈 (OPEN)</option>
                <option value="COMPLETED">완료 (COMPLETED)</option>
                <option value="CANCELLED">취소 (CANCELLED)</option>
            </select>
            <select id="period">
                <option value="">전체 기간</option>
                <option value="upcoming">진행 예정만</option>
                <option value="past">지난 수업만</option>
            </select>
            <div style="flex: 1;"></div>
            <button class="btn-ghost" id="reloadButton">새로고침</button>
            <button class="btn-ghost" id="cleanupButton">취소 일정 정리</button>
        </section>

        <section class="card table-card">
            <div class="table-scroll">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>시작</th>
                        <th>종료</th>
                        <th class="num">예약/정원</th>
                        <th>정원 현황</th>
                        <th>상태</th>
                        <th>관리</th>
                    </tr>
                    </thead>
                    <tbody id="tableBody">
                    <tr><td colspan="7" class="empty">불러오는 중...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination" id="pagination"></div>
            <div class="page-info" id="pageInfo"></div>
            <div class="message error" id="errorMessage"></div>
        </section>
    </main>
</div>

<script src="/assets/js/common.js"></script>
<script src="/assets/js/console.js"></script>
<script src="/assets/js/trainer.js"></script>
<script>
    // 내 일정 전체를 받아 검색·페이징은 클라이언트에서 처리한다.
    const state = { all: [], page: 0, size: loadConsoleSettings().pageSize, editingId: null, busy: false };

    async function loadSchedules() {
        const error = document.getElementById('errorMessage');
        error.textContent = '';
        try {
            state.all = await trainerRequest('/api/trainer/schedules');
            renderSummary();
            render();
        } catch (e) {
            document.getElementById('tableBody').innerHTML =
                '<tr><td colspan="7" class="empty">일정을 불러오지 못했습니다.</td></tr>';
            error.textContent = e.message;
        }
    }

    function renderSummary() {
        const now = Date.now();
        const open = state.all.filter(schedule => schedule.status === 'OPEN'
            && new Date(schedule.startTime).getTime() > now);
        document.getElementById('statTotal').innerHTML = `${state.all.length}<small>건</small>`;
        document.getElementById('statOpen').innerHTML = `${open.length}<small>건</small>`;
        document.getElementById('statFull').innerHTML =
            `${state.all.filter(schedule => schedule.full).length}<small>건</small>`;
        document.getElementById('statCancelled').innerHTML =
            `${state.all.filter(schedule => schedule.status === 'CANCELLED').length}<small>건</small>`;
    }

    function filtered() {
        const status = document.getElementById('status').value;
        const period = document.getElementById('period').value;
        const now = Date.now();

        return state.all
            .filter(schedule => {
                if (status && schedule.status !== status) return false;
                const startedAt = new Date(schedule.startTime).getTime();
                if (period === 'upcoming' && startedAt <= now) return false;
                if (period === 'past' && startedAt > now) return false;
                return true;
            })
            .sort((a, b) => b.startTime.localeCompare(a.startTime));
    }

    function render() {
        const result = slicePage(filtered(), state.page, state.size);
        state.page = result.page;

        const now = Date.now();
        const body = document.getElementById('tableBody');
        body.innerHTML = result.content.length
            ? result.content.map(schedule => {
                const cancelled = schedule.status === 'CANCELLED';
                const started = new Date(schedule.startTime).getTime() <= now;
                return `
                    <tr>
                        <td class="muted">#${schedule.id}</td>
                        <td>${formatDateTime(schedule.startTime)}</td>
                        <td class="muted">${formatDateTime(schedule.endTime)}</td>
                        <td class="num">${schedule.reservedCount} / ${schedule.capacity}</td>
                        <td>
                            ${schedule.full ? '<span class="badge badge-canceled">마감</span>'
                                : `<span class="muted">잔여 ${schedule.availableCount}명</span>`}
                            ${renderGauge(schedule.reservedCount, schedule.capacity)}
                        </td>
                        <td>${renderBadge(SCHEDULE_STATUS_BADGE, schedule.status)}</td>
                        <td>
                            <div class="row-actions">
                                ${cancelled
                                    ? `<button class="btn-ghost btn-sm" data-action="restore" data-id="${schedule.id}">복원</button>`
                                    : `<button class="btn-ghost btn-sm" data-action="edit" data-id="${schedule.id}"
                                            ${started ? 'disabled title="이미 시작된 수업"' : ''}>수정</button>
                                       <button class="btn-danger btn-sm" data-action="cancel" data-id="${schedule.id}">취소</button>`}
                                <button class="btn-ghost btn-sm" data-action="roster" data-id="${schedule.id}">예약자</button>
                            </div>
                        </td>
                    </tr>`;
            }).join('')
            : '<tr><td colspan="7" class="empty">조건에 맞는 일정이 없습니다.</td></tr>';

        renderPageFooter(document.getElementById('pagination'), document.getElementById('pageInfo'), result);
    }

    /* ----- 생성 / 수정 ----- */

    function showFormMessage(text, isError = false) {
        const message = document.getElementById('formMessage');
        message.className = `message ${isError ? 'error' : 'success'}`;
        message.textContent = text;
    }

    function startEdit(scheduleId) {
        const schedule = state.all.find(item => item.id === scheduleId);
        if (!schedule) return;
        state.editingId = scheduleId;
        document.getElementById('startTime').value = schedule.startTime.slice(0, 16);
        document.getElementById('endTime').value = schedule.endTime.slice(0, 16);
        document.getElementById('capacity').value = schedule.capacity;
        document.getElementById('formTitle').textContent = `✏️ 수업 #${scheduleId} 수정`;
        document.getElementById('formDesc').textContent = '수정할 내용을 입력한 뒤 저장하세요.';
        document.getElementById('submitButton').textContent = '수정 저장';
        document.getElementById('cancelEditButton').style.display = '';
        showFormMessage('');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function endEdit() {
        state.editingId = null;
        document.getElementById('formTitle').textContent = '🗓️ 수업 일정 생성';
        document.getElementById('formDesc').textContent = '시작 시각을 고르면 종료 시각이 1시간 뒤로 자동 설정됩니다.';
        document.getElementById('submitButton').textContent = '일정 생성';
        document.getElementById('cancelEditButton').style.display = 'none';
        showFormMessage('');
    }

    async function submitForm() {
        if (state.busy) return;
        const startTime = document.getElementById('startTime').value;
        const endTime = document.getElementById('endTime').value;
        const capacity = Number(document.getElementById('capacity').value);

        if (!startTime || !endTime) {
            showFormMessage('시작·종료 시각을 입력해 주세요.', true);
            return;
        }
        if (startTime >= endTime) {
            showFormMessage('종료 시각은 시작 시각보다 뒤여야 합니다.', true);
            return;
        }
        if (!capacity || capacity < 1) {
            showFormMessage('정원은 1명 이상이어야 합니다.', true);
            return;
        }

        const button = document.getElementById('submitButton');
        state.busy = true;
        button.disabled = true;
        try {
            const editing = state.editingId !== null;
            const data = await trainerRequest(
                editing ? `/api/trainer/schedules/${state.editingId}` : '/api/trainer/schedules',
                {
                    method: editing ? 'PUT' : 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ startTime, endTime, capacity })
                });
            if (editing) endEdit();
            showFormMessage(`수업 #${data.id} ${editing ? '수정' : '생성'}이 완료되었습니다.`);
            await loadSchedules();
        } catch (e) {
            showFormMessage(e.message, true);
        } finally {
            state.busy = false;
            button.disabled = false;
        }
    }

    /* ----- 취소 / 복원 / 정리 ----- */

    async function cancelSchedule(scheduleId) {
        if (!confirm(`수업 #${scheduleId} 을(를) 취소할까요?`)) return;
        try {
            await trainerRequest(`/api/trainer/schedules/${scheduleId}/cancel`, { method: 'PATCH' });
            await loadSchedules();
        } catch (e) { alert(e.message); }
    }

    async function restoreSchedule(scheduleId) {
        try {
            await trainerRequest(`/api/trainer/schedules/${scheduleId}/restore`, { method: 'PATCH' });
            await loadSchedules();
        } catch (e) { alert(e.message); }
    }

    async function cleanupSchedules() {
        if (state.busy) return;
        const confirmed = confirm(
            '취소된 일정을 목록에서 정리합니다.\n'
            + '예약 이력이 없는 취소 일정은 완전히 삭제되어 이후 복원할 수 없습니다.\n계속하시겠습니까?');
        if (!confirmed) return;

        const button = document.getElementById('cleanupButton');
        state.busy = true;
        button.disabled = true;
        button.textContent = '정리 중...';
        try {
            const result = await trainerRequest('/api/trainer/schedules/refresh', { method: 'POST' });
            state.all = result.schedules;
            renderSummary();
            render();
            alert(`삭제 ${result.deletedCount}건 · 보관 ${result.archivedCount}건 정리했습니다.`);
        } catch (e) {
            alert(e.message);
        } finally {
            state.busy = false;
            button.disabled = false;
            button.textContent = '취소 일정 정리';
        }
    }

    function setDefaultEndTime() {
        const startInput = document.getElementById('startTime');
        if (!startInput.value) return;
        const end = new Date(startInput.value);
        end.setHours(end.getHours() + 1);
        document.getElementById('endTime').value = toDateTimeInput(end);
    }

    document.addEventListener('DOMContentLoaded', () => {
        if (!initTrainerPage('schedule')) return;

        // 기본 시작 시각: 내일 오전 10시
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        tomorrow.setHours(10, 0, 0, 0);
        document.getElementById('startTime').value = toDateTimeInput(tomorrow);
        setDefaultEndTime();

        document.getElementById('startTime').addEventListener('change', setDefaultEndTime);
        document.getElementById('submitButton').addEventListener('click', submitForm);
        document.getElementById('cancelEditButton').addEventListener('click', endEdit);
        document.getElementById('reloadButton').addEventListener('click', loadSchedules);
        document.getElementById('cleanupButton').addEventListener('click', cleanupSchedules);
        document.getElementById('status').addEventListener('change', () => { state.page = 0; render(); });
        document.getElementById('period').addEventListener('change', () => { state.page = 0; render(); });

        document.getElementById('tableBody').addEventListener('click', event => {
            const button = event.target.closest('button[data-action]');
            if (!button || button.disabled) return;
            const scheduleId = Number(button.dataset.id);
            if (button.dataset.action === 'edit') startEdit(scheduleId);
            if (button.dataset.action === 'cancel') cancelSchedule(scheduleId);
            if (button.dataset.action === 'restore') restoreSchedule(scheduleId);
            if (button.dataset.action === 'roster') {
                location.href = `/trainer-reservation.html?scheduleId=${scheduleId}`;
            }
        });
        document.getElementById('pagination').addEventListener('click', event => {
            const button = event.target.closest('button[data-page]');
            if (button && !button.disabled) {
                state.page = Number(button.dataset.page);
                render();
            }
        });

        loadSchedules();
    });
</script>
</body>
</html>
