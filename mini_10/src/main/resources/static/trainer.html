<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>트레이너 일정 관리</title>
    <style>
        body { font-family: sans-serif; padding: 36px; background: #f7f8fa; }
        .header { display: flex; justify-content: space-between; align-items: center; max-width: 760px; }
        .card { max-width: 720px; margin: 18px 0; padding: 22px; border: 1px solid #ddd; border-radius: 9px; background: white; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        label { display: flex; flex-direction: column; gap: 5px; font-size: 14px; }
        input, select { padding: 9px; border: 1px solid #bbb; border-radius: 5px; }
        button { padding: 9px 15px; border: 0; border-radius: 5px; cursor: pointer; }
        .primary { background: #e0a800; color: #212529; font-weight: bold; }
        .secondary { background: #6c757d; color: white; }
        .danger { background: #dc3545; color: white; }
        .schedule { padding: 12px; margin-top: 9px; border: 1px solid #ddd; border-radius: 6px; }
        .schedule.cancelled { opacity: 0.65; background: #f1f1f1; }
        .message { margin-top: 12px; white-space: pre-wrap; }
    </style>
</head>
<body>
<div class="header">
    <h2>트레이너 일정 관리</h2>
    <div>
        <button class="secondary" onclick="location.href='/board.html'">메인으로</button>
        <button class="danger" onclick="jwtLogout()">로그아웃</button>
    </div>
</div>

<div class="card">
    <h3>수업 일정 생성</h3>
    <div class="grid">
        <label>시작 시각<input id="startTime" type="datetime-local"></label>
        <label>종료 시각<input id="endTime" type="datetime-local"></label>
        <label>정원<input id="capacity" type="number" min="1" value="10"></label>
    </div>
    <p><button class="primary" onclick="createSchedule()">일정 생성</button></p>
    <div id="createMessage" class="message"></div>
</div>

<div class="card">
    <h3>요일별 반복 일정</h3>
    <div class="grid">
        <label>요일
            <select id="dayOfWeek">
                <option value="MONDAY">월요일</option><option value="TUESDAY">화요일</option>
                <option value="WEDNESDAY">수요일</option><option value="THURSDAY">목요일</option>
                <option value="FRIDAY">금요일</option><option value="SATURDAY">토요일</option>
                <option value="SUNDAY">일요일</option>
            </select>
        </label>
        <label>시작 시간<input id="templateStart" type="time" value="10:00"></label>
        <label>종료 시간<input id="templateEnd" type="time" value="11:00"></label>
        <label>정원<input id="templateCapacity" type="number" min="1" value="10"></label>
        <label>적용 시작일<input id="effectiveFrom" type="date"></label>
        <label>적용 종료일<input id="effectiveTo" type="date"></label>
    </div>
    <p>
        <button id="createTemplateButton" class="primary" onclick="createTemplate()">반복 일정 등록</button>
    </p>
    <div id="templateMessage" class="message"></div>
</div>

<div class="card">
    <h3>내 수업 일정</h3>
    <button id="refreshButton" class="primary" onclick="refreshSchedules()">일정 새로고침</button>
    <div id="scheduleList"></div>
</div>

<script src="/assets/js/common.js"></script>
<script>
    async function request(url, options = {}) {
        const response = await jwtFetch(url, options);
        if (response.status === 401) {
            alert('로그인이 필요합니다.');
            location.href = '/login.html';
            throw new Error('로그인 필요');
        }
        const text = await response.text();
        const data = text ? JSON.parse(text) : null;
        if (!response.ok) throw new Error(data?.message || `요청 실패 (${response.status})`);
        return data;
    }

    async function createSchedule() {
        const message = document.getElementById('createMessage');
        try {
            const data = await request('/api/trainer/schedules', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    startTime: document.getElementById('startTime').value,
                    endTime: document.getElementById('endTime').value,
                    capacity: Number(document.getElementById('capacity').value)
                })
            });
            message.textContent = `일정 생성 성공 (ID: ${data.id})`;
            await loadSchedules();
        } catch (e) { message.textContent = e.message; }
    }

    let creatingTemplate = false;

    async function createTemplate() {
        if (creatingTemplate) return;

        const message = document.getElementById('templateMessage');
        const button = document.getElementById('createTemplateButton');
        const startDate = document.getElementById('effectiveFrom').value;
        const endDate = document.getElementById('effectiveTo').value;
        creatingTemplate = true;
        button.disabled = true;
        try {
            const data = await request('/api/trainer/schedule-templates', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    dayOfWeek: document.getElementById('dayOfWeek').value,
                    startTime: document.getElementById('templateStart').value,
                    endTime: document.getElementById('templateEnd').value,
                    capacity: Number(document.getElementById('templateCapacity').value),
                    effectiveFrom: startDate,
                    effectiveTo: endDate || null
                })
            });

            message.textContent = `반복 일정과 실제 수업 등록 성공 (ID: ${data.id})`;
            await loadSchedules();
        } catch (e) {
            message.textContent = e.message;
        } finally {
            creatingTemplate = false;
            button.disabled = false;
        }
    }

    function localDate(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    function addDays(value, days) {
        const date = new Date(`${value}T00:00:00`);
        date.setDate(date.getDate() + days);
        return localDate(date);
    }

    function addOneMonth(value) {
        const [year, month, day] = value.split('-').map(Number);
        const targetMonthIndex = month;
        const targetYear = year + Math.floor(targetMonthIndex / 12);
        const targetMonth = targetMonthIndex % 12;
        const lastDay = new Date(targetYear, targetMonth + 1, 0).getDate();
        return localDate(new Date(targetYear, targetMonth, Math.min(day, lastDay)));
    }

    function updateEffectiveEndDate() {
        const startDate = document.getElementById('effectiveFrom').value;
        if (startDate) {
            document.getElementById('effectiveTo').value = addOneMonth(startDate);
        }
    }

    function setDefaultEndTime() {
        const startInput = document.getElementById('startTime');
        const endInput = document.getElementById('endTime');
        if (!startInput.value) return;

        const end = new Date(startInput.value);
        end.setHours(end.getHours() + 1);
        const year = end.getFullYear();
        const month = String(end.getMonth() + 1).padStart(2, '0');
        const day = String(end.getDate()).padStart(2, '0');
        const hour = String(end.getHours()).padStart(2, '0');
        const minute = String(end.getMinutes()).padStart(2, '0');
        endInput.value = `${year}-${month}-${day}T${hour}:${minute}`;
    }

    async function loadSchedules() {
        try {
            const schedules = await request('/api/trainer/schedules');
            renderSchedules(schedules);
        } catch (e) { document.getElementById('scheduleList').textContent = e.message; }
    }

    function statusLabel(status) {
        const labels = {OPEN: '예약 가능', CANCELLED: '취소됨', COMPLETED: '수업 완료'};
        return labels[status] || status;
    }

    function renderSchedules(schedules) {
        const list = document.getElementById('scheduleList');
        list.innerHTML = schedules.length ? '' : '<p>등록한 일정이 없습니다.</p>';
        schedules.forEach(schedule => {
            const cancelled = schedule.status === 'CANCELLED';
            const item = document.createElement('div');
            item.className = `schedule${cancelled ? ' cancelled' : ''}`;
            item.innerHTML = `<strong>#${schedule.id} ${schedule.startTime} ~ ${schedule.endTime}</strong>
                <p>정원 ${schedule.capacity}명 / 예약 ${schedule.reservedCount}명 / 상태 ${statusLabel(schedule.status)}</p>
                ${cancelled
                    ? `<button class="primary" onclick="restoreSchedule(${schedule.id})">일정 복원</button>`
                    : `<button class="danger" onclick="cancelSchedule(${schedule.id})">일정 취소</button>`}`;
            list.appendChild(item);
        });
    }

    async function cancelSchedule(id) {
        if (!confirm('이 일정을 취소할까요?')) return;
        try {
            await request(`/api/trainer/schedules/${id}/cancel`, {method: 'PATCH'});
            await loadSchedules();
        } catch (e) { alert(e.message); }
    }

    async function restoreSchedule(id) {
        try {
            await request(`/api/trainer/schedules/${id}/restore`, {method: 'PATCH'});
            await loadSchedules();
        } catch (e) { alert(e.message); }
    }

    let refreshingSchedules = false;

    async function refreshSchedules() {
        if (refreshingSchedules) return;
        const confirmed = window.confirm(
            '새로고침하면 취소된 일정이 목록에서 제거됩니다.\n' +
            '예약 이력이 없는 취소 일정은 완전히 삭제되어 이후 복원할 수 없습니다.\n' +
            '계속하시겠습니까?'
        );
        if (!confirmed) return;

        const button = document.getElementById('refreshButton');
        refreshingSchedules = true;
        button.disabled = true;
        button.textContent = '정리 중...';
        try {
            const result = await request('/api/trainer/schedules/refresh', {method: 'POST'});
            renderSchedules(result.schedules);
        } catch (e) {
            alert(e.message);
        } finally {
            refreshingSchedules = false;
            button.disabled = false;
            button.textContent = '일정 새로고침';
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        if (!getJwtToken()) location.href = '/login.html';
        document.getElementById('startTime').addEventListener('change', setDefaultEndTime);
        document.getElementById('effectiveFrom').addEventListener('change', updateEffectiveEndDate);
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        document.getElementById('effectiveFrom').value = localDate(tomorrow);
        updateEffectiveEndDate();
        loadSchedules();
    });
</script>
</body>
</html>
