<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>관리자 페이지 - 수강권 관리</title>
    <style>
        body { font-family: sans-serif; padding: 40px; }
        .header { display: flex; justify-content: space-between; align-items: center; width: 490px; }
        .header-actions { display: flex; align-items: center; gap: 9px; }
        .current-user { color: #495057; font-size: 14px; font-weight: bold; }
        .card { border: 1px solid #ddd; padding: 20px; border-radius: 8px; margin-bottom: 20px; width: 450px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; font-weight: bold; }
        .form-group input, .form-group select { width: 95%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 18px; cursor: pointer; border-radius: 4px; border: none; }
        .submit-btn { background-color: #198754; color: white; }
        .back-btn { background-color: #6c757d; color: white; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>⚙️ 관리자 전용 페이지</h2>
        <div class="header-actions">
            <span class="current-user"></span>
            <button class="back-btn" onclick="location.href='/board.html'">메인으로</button>
            <button style="background:#dc3545;color:white" onclick="jwtLogout()">로그아웃</button>
        </div>
    </div>

    <div class="card">
        <h3>🎟️ 수강권(Ticket) 발급 테스트</h3>
        
        <div class="form-group">
            <label>대상 회원</label>
            <select id="userId"><option value="">회원을 불러오는 중...</option></select>
        </div>

        <div class="form-group">
            <label>총 횟수 (totalCount)</label>
            <input type="number" id="totalCount" value="10">
        </div>

        <div class="form-group">
            <label>시작일 (startDate)</label>
            <input type="date" id="startDate">
        </div>

        <div class="form-group">
            <label>종료일 (endDate)</label>
            <input type="date" id="endDate">
        </div>

        <button class="submit-btn" onclick="issueTicket()">수강권 발급 요청</button>
        <p id="ticketResult"></p>
    </div>

    <button class="back-btn" onclick="location.href='/board.html'">⬅️ 게시판으로 돌아가기</button>

    <script src="/assets/js/common.js"></script>
    <script>
        // 기본 날짜 자동 세팅 (오늘 ~ 1개월 후)
        document.addEventListener("DOMContentLoaded", () => {
            if (!getJwtToken()) {
                location.href = '/login.html';
                return;
            }
            renderCurrentUser();
            const today = new Date();
            const nextMonth = new Date();
            nextMonth.setMonth(today.getMonth() + 1);

            document.getElementById('startDate').value = today.toISOString().substring(0, 10);
            document.getElementById('endDate').value = nextMonth.toISOString().substring(0, 10);
            loadCustomers();
        });

        async function loadCustomers() {
            const select = document.getElementById('userId');
            const response = await jwtFetch('/admin/users/customers');
            if (!response.ok) {
                select.innerHTML = '<option value="">회원 목록 조회 실패</option>';
                return;
            }
            const users = await response.json();
            select.innerHTML = '<option value="">회원 선택</option>' + users.map(user =>
                `<option value="${user.id}">${user.name} (${user.email})</option>`).join('');
        }

        async function issueTicket() {
            const dto = {
                userId: parseInt(document.getElementById('userId').value),
                totalCount: parseInt(document.getElementById('totalCount').value),
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value
            };

            if (!dto.userId) {
                alert("회원을 선택해 주세요.");
                return;
            }

            // AdminTicketController 엔드포인트 호출 (/admin/tickets/issue)
            const response = await jwtFetch('/admin/tickets/issue', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dto)
            });

            if (response.status === 401) {
                alert('로그인이 필요합니다.');
                window.location.href = '/login.html';
                return;
            }

            if (response.status === 403) {
                document.getElementById('ticketResult').innerText = '❌ 권한 오류: ADMIN 권한만 발급이 가능합니다.';
                return;
            }

            const text = await response.text();
            document.getElementById('ticketResult').innerText = `⭕ ${text}`;
        }
    </script>
</body>
</html>
