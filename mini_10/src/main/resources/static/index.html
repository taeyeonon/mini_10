<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>메인 - JWT Demo</title>
    <style>
        body { 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            border: 1px solid #ccc; 
            padding: 40px; 
            border-radius: 8px; 
            text-align: center; 
            width: 320px;
        }
        .btn { 
            display: block; 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 16px;
            text-decoration: none;
            box-sizing: border-box;
        }
        .btn-login { background-color: #007bff; color: white; }
        .btn-board { background-color: #28a745; color: white; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🚀 index.html </h2>

        <a href="/login.html" id="loginBtn" class="btn btn-login">로그인 하러가기</a>
        <a href="/board.html" id="boardBtn" class="btn btn-board" style="display: none;">게시판으로 이동</a>
    </div>

    <script src="/assets/js/common.js"></script>
    <script>
        window.onload = () => {
            const token = getJwtToken();
            
            // 토큰이 이미 있으면 바로 메인 게시판으로 자동 리다이렉트 (선택 사항)
            if (token) {
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('boardBtn').style.display = 'block';
                
                // 필요하다면 바로 게시판으로 자동 이동시키기:
                // window.location.href = '/board.html';
            } else {
                document.getElementById('welcomeMsg').innerText = '서비스를 이용하시려면 로그인해 주세요.';
            }
        };
    </script>
</body>
</html>
