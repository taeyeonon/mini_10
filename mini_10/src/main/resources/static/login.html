<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { border: 1px solid #ccc; padding: 30px; border-radius: 8px; width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin-bottom: 12px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        a { display: inline-block; margin-top: 15px; color: #555; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>로그인</h2>
        <input type="email" id="email" placeholder="이메일" value="admin@test.com">
        <input type="password" id="password" placeholder="비밀번호" value="admin1234">
        <button onclick="login()">로그인</button>
        <br>
        <a href="/register.html">회원가입 하러가기</a>
    </div>

    <script src="/assets/js/common.js"></script>
    <script>
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const response = await jwtFetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (data.result === 'success') {
                // 발급받은 JWT 토큰 저장
                sessionStorage.setItem('accessToken', data.token);
                alert('로그인 성공!');
                window.location.href = '/board.html';
            } else {
                alert('로그인 실패! 이메일이나 비밀번호를 확인하세요.');
            }
        }
    </script>
</body>
</html>
