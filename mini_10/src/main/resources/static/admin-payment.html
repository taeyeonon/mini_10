<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>관리자 - 수강권/결제 관리</title>
    <link rel="stylesheet" href="/assets/css/console.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar"></aside>

    <main class="main">
        <div class="page-header">
            <div>
                <h1>수강권 및 결제 관리 내역</h1>
                <div class="today"></div>
            </div>
            <div class="profile">
                <div class="avatar">A</div>
                <div class="profile-text">
                    <div class="role">관리자</div>
                    <div class="email"></div>
                </div>
                <button class="btn-ghost" onclick="jwtLogout()">로그아웃</button>
            </div>
        </div>

        <section class="summary">
            <div class="card">
                <div class="label">총 결제 시도</div>
                <div class="value" id="summaryTotal">-<small>건</small></div>
            </div>
            <div class="card">
                <div class="label">결제 완료 <span class="badge badge-paid">PAID</span></div>
                <div class="value" id="summaryPaid">-<small>건</small></div>
            </div>
            <div class="card">
                <div class="label">결제 대기 <span class="badge badge-ready">READY</span></div>
                <div class="value" id="summaryReady">-<small>건</small></div>
            </div>
        </section>

        <section class="card toolbar">
            <input type="text" id="keyword" placeholder="주문번호 · 회원ID · 이름 · 이메일로 검색">
            <select id="status">
                <option value="">전체 상태</option>
                <option value="READY">결제 대기 (READY)</option>
                <option value="PAID">결제 완료 (PAID)</option>
                <option value="FAILED">결제 실패/취소 (FAILED)</option>
            </select>
            <button class="btn-primary" id="searchButton">검색</button>
            <button class="btn-ghost" id="refreshButton">새로고침</button>
        </section>

        <section class="card table-card">
            <div class="table-scroll">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>회원</th>
                        <th>주문번호</th>
                        <th class="num">횟수</th>
                        <th class="num">금액</th>
                        <th>상태</th>
                        <th>요청 시각</th>
                        <th>승인 시각</th>
                        <th>토스 승인키</th>
                    </tr>
                    </thead>
                    <tbody id="tableBody">
                    <tr><td colspan="9" class="empty">불러오는 중...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination" id="pagination"></div>
            <div class="page-info" id="pageInfo"></div>
            <div class="message error" id="errorMessage"></div>
        </section>
    </main>
</div>

<script src="/assets/js/common.js"></script>
<script src="/assets/js/console.js"></script>
<script src="/assets/js/admin.js"></script>
<script>
    const state = { page: 0, size: loadAdminSettings().pageSize, keyword: '', status: '' };

    async function loadPayments() {
        const error = document.getElementById('errorMessage');
        error.textContent = '';
        try {
            const query = new URLSearchParams({ page: state.page, size: state.size });
            if (state.keyword) query.set('keyword', state.keyword);
            if (state.status) query.set('status', state.status);

            const result = await adminRequest(`/api/admin/payments?${query}`);
            renderSummary(result.summary);
            renderTable(result.content);
            renderPagination(document.getElementById('pagination'), result);
            document.getElementById('pageInfo').textContent = result.totalPages
                ? `전체 ${result.totalElements.toLocaleString()}건 · ${result.page + 1} / ${result.totalPages} 페이지`
                : '';
        } catch (e) {
            document.getElementById('tableBody').innerHTML =
                '<tr><td colspan="9" class="empty">결제 내역을 불러오지 못했습니다.</td></tr>';
            document.getElementById('pagination').innerHTML = '';
            document.getElementById('pageInfo').textContent = '';
            error.textContent = e.message;
        }
    }

    function renderSummary(summary) {
        document.getElementById('summaryTotal').innerHTML = `${summary.total.toLocaleString()}<small>건</small>`;
        document.getElementById('summaryPaid').innerHTML = `${summary.paid.toLocaleString()}<small>건</small>`;
        document.getElementById('summaryReady').innerHTML = `${summary.ready.toLocaleString()}<small>건</small>`;
    }

    function renderTable(payments) {
        const body = document.getElementById('tableBody');
        if (!payments.length) {
            body.innerHTML = '<tr><td colspan="9" class="empty">조건에 맞는 결제 내역이 없습니다.</td></tr>';
            return;
        }
        body.innerHTML = payments.map(payment => `
            <tr>
                <td class="muted">#${payment.id}</td>
                <td>
                    ${escapeHtml(payment.userName)}
                    <div class="muted mono">ID ${payment.userId} · ${escapeHtml(payment.userEmail)}</div>
                </td>
                <td class="mono">${escapeHtml(payment.orderId)}</td>
                <td class="num">${payment.ticketCount}회</td>
                <td class="num">${payment.amount.toLocaleString()}원</td>
                <td>${renderBadge(PAYMENT_STATUS_BADGE, payment.status)}</td>
                <td class="muted">${formatDateTime(payment.createdAt)}</td>
                <td class="muted">${formatDateTime(payment.approvedAt)}</td>
                <td class="muted mono">${escapeHtml(payment.paymentKey) || '-'}</td>
            </tr>`).join('');
    }

    function search() {
        state.keyword = document.getElementById('keyword').value.trim();
        state.status = document.getElementById('status').value;
        state.page = 0;
        loadPayments();
    }

    document.addEventListener('DOMContentLoaded', () => {
        if (!initAdminPage('payment')) return;

        document.getElementById('searchButton').addEventListener('click', search);
        document.getElementById('refreshButton').addEventListener('click', loadPayments);
        document.getElementById('status').addEventListener('change', search);
        document.getElementById('keyword').addEventListener('keydown', event => {
            if (event.key === 'Enter') search();
        });
        document.getElementById('pagination').addEventListener('click', event => {
            const button = event.target.closest('button[data-page]');
            if (button && !button.disabled) {
                state.page = Number(button.dataset.page);
                loadPayments();
            }
        });

        loadPayments();
    });
</script>
</body>
</html>
